<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Cormorant+Upright:wght@300&display=swap" rel="stylesheet">
<title>Verses</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  width:100%;height:100%;overflow:hidden;
  overscroll-behavior:none;
  font-family:'EB Garamond',Georgia,serif;
  display:flex;align-items:center;justify-content:center;
  background:#0e0c18;
}

/* ── deep midnight blue background ── */
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 75% 50% at 50% 0%, rgba(100,80,180,0.10) 0%,transparent 60%),
    radial-gradient(ellipse 55% 65% at 5% 95%,  rgba(60,40,120,0.18) 0%,transparent 55%),
    radial-gradient(ellipse 55% 55% at 95% 5%,  rgba(50,35,110,0.14) 0%,transparent 55%),
    linear-gradient(155deg,#131228 0%,#0a0916 55%,#111020 100%);
}

/* ── BOOK WRAPPER ── */
.shell{position:relative;z-index:1;}

.shadow{
  position:absolute;bottom:-20px;left:8%;right:8%;height:32px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.5) 0%,transparent 70%);
  pointer-events:none;
}

/* ── THE BOOK ── */
#book{
  position:relative;
  display:flex;
  overflow:hidden;        /* clips the sliding pages */
  border-radius:3px;
}

/* ── EACH HALF PAGE ── */
.pg{
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}

/* Spine center shadow — always on */
.spine{
  position:absolute;top:0;z-index:20;
  width:24px;height:100%;
  background:linear-gradient(to right,
    rgba(0,0,0,0.06) 0%,
    rgba(0,0,0,0.20) 40%,
    rgba(0,0,0,0.20) 60%,
    rgba(0,0,0,0.06) 100%);
  pointer-events:none;
}

/* ═══════════════════════════════
   PAGE TURN — sliding panel
   The outgoing page slides out,
   the incoming page slides in.
   That's it. Reliable everywhere.
═══════════════════════════════ */
.pg{transition:none;}  /* default no transition */

/* ═══════════════════════════════
   COVER
═══════════════════════════════ */
.cover-face{
  width:100%;height:100%;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:9%;text-align:center;
  background:
    radial-gradient(ellipse at 35% 28%, rgba(100,80,160,0.45) 0%,transparent 55%),
    radial-gradient(ellipse at 65% 72%, rgba(40,25,90,0.55)   0%,transparent 55%),
    repeating-linear-gradient(122deg,transparent 0,transparent 5px,rgba(255,255,255,0.010) 5px,rgba(255,255,255,0.010) 6px),
    linear-gradient(150deg,#22183e 0%,#130e28 55%,#1c1436 100%);
}
.cover-face::before{content:"";position:absolute;inset:5%;border:1px solid rgba(180,160,230,0.28);pointer-events:none;}
.cover-face::after {content:"";position:absolute;inset:6.5%;border:1px solid rgba(180,160,230,0.09);pointer-events:none;}
.cn{position:absolute;width:17px;height:17px;border-style:solid;border-color:rgba(180,160,230,0.50);}
.cn.tl{top:3.8%;left:3.8%;border-width:1.5px 0 0 1.5px;}
.cn.tr{top:3.8%;right:3.8%;border-width:1.5px 1.5px 0 0;}
.cn.bl{bottom:3.8%;left:3.8%;border-width:0 0 1.5px 1.5px;}
.cn.br{bottom:3.8%;right:3.8%;border-width:0 1.5px 1.5px 0;}
.sp-l{position:absolute;top:0;left:0;width:12px;height:100%;background:linear-gradient(to right,rgba(0,0,0,0.60),transparent);pointer-events:none;}
.sp-r{position:absolute;top:0;right:0;width:12px;height:100%;background:linear-gradient(to left,rgba(0,0,0,0.60),transparent);pointer-events:none;}

.cov-img{
  width:56%;aspect-ratio:3/4;
  border:1px solid rgba(180,160,230,0.30);
  box-shadow:0 5px 26px rgba(0,0,0,0.6),inset 0 0 18px rgba(0,0,0,0.4);
  overflow:hidden;position:relative;margin-bottom:6%;flex-shrink:0;z-index:1;
}
.cov-img img{width:100%;height:100%;object-fit:cover;display:block;}
.cov-img .noimg{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#2e1e50 0%,#130e28 100%);
}
.noimg svg{opacity:0.16;}

.cov-eye{font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,.82vw,10px);letter-spacing:.48em;text-transform:uppercase;color:#c4b4e8;opacity:.60;margin-bottom:8px;}
.cov-ttl{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(18px,2.8vw,36px);color:#f0ecfc;line-height:1.05;text-shadow:0 2px 16px rgba(0,0,0,0.6);}
.cov-rule{width:46%;height:1px;margin:9px auto;background:linear-gradient(to right,transparent,rgba(180,160,230,0.46),transparent);}
.cov-auth{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(9px,1.05vw,13px);color:#c4b4e8;opacity:.66;letter-spacing:.12em;}

/* ── inner dark ── */
.inner-dark{
  width:100%;height:100%;
  background:linear-gradient(140deg,#1a1430 0%,#0e0c20 100%);
  display:flex;align-items:flex-end;justify-content:flex-end;padding:9%;
}
.inner-dark span{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(7px,.70vw,9px);letter-spacing:.16em;color:rgba(180,160,230,0.16);writing-mode:vertical-rl;}

/* ── paper ── */
.paper{
  width:100%;height:100%;background:#fdf8f4;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.paper::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 75% 50% at 18% 14%,rgba(120,100,180,0.04) 0%,transparent 55%),
    radial-gradient(ellipse 65% 60% at 82% 86%,rgba(90, 70,150,0.03) 0%,transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%,transparent 58%,rgba(0,0,0,0.028) 100%);
}

/* ── title page ── */
.tp{padding:11%;text-align:center;width:100%;position:relative;z-index:1;}
.tp-vl {width:1px;background:linear-gradient(to bottom,transparent,#5a3a8a);margin:0 auto 15px;}
.tp-vlb{width:1px;background:linear-gradient(to bottom,#5a3a8a,transparent);margin:15px auto 0;}
.tp-eye{font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,.78vw,9px);letter-spacing:.5em;text-transform:uppercase;color:#8a7aaa;margin-bottom:12px;display:block;}
.tp-ttl{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,3.8vw,48px);color:#140e22;line-height:1.0;margin-bottom:8px;display:block;}
.tp-sub{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(10px,1.1vw,13px);color:#5a4a6e;margin-bottom:16px;display:block;}
.tp-rule{width:30%;height:1px;margin:0 auto 14px;background:linear-gradient(to right,transparent,rgba(90,58,138,0.20),transparent);}
.tp-auth{font-family:'EB Garamond',serif;font-size:clamp(10px,1.1vw,13px);color:#302438;letter-spacing:.10em;display:block;}

/* ── dedication ── */
.ded{padding:14%;text-align:center;width:100%;position:relative;z-index:1;}
.ded-q{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(11px,1.4vw,17px);color:#302438;line-height:2;margin-bottom:16px;}
.ded-at{font-family:'EB Garamond',serif;font-size:clamp(9px,.98vw,12px);letter-spacing:.22em;color:#8a7aaa;}

/* ── poem ── */
.poem-wrap{padding:8% 9%;width:100%;position:relative;z-index:1;}
.poem-inner{text-align:center;display:flex;flex-direction:column;align-items:center;width:82%;margin:0 auto;}
.p-roman{font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,.74vw,9px);letter-spacing:.45em;text-transform:uppercase;color:#5a3a8a;opacity:.46;margin-bottom:7px;}
.p-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(14px,1.8vw,22px);color:#140e22;line-height:1.2;margin-bottom:11px;}
.p-orn{color:#5a3a8a;opacity:.24;font-size:clamp(9px,.82vw,11px);letter-spacing:.65em;margin-bottom:13px;}
.p-body{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(11.5px,1.26vw,16px);color:#302438;line-height:2.1;text-align:center;}
.p-body p{min-height:1.1em;}
.p-num{position:absolute;bottom:5%;width:100%;text-align:center;font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,.70vw,9px);letter-spacing:.35em;color:#8a7aaa;opacity:.34;}

/* ── back cover ── */
.back-cv{
  width:100%;height:100%;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:13%;
  background:
    radial-gradient(ellipse at 55% 32%, rgba(80,55,150,0.44) 0%,transparent 55%),
    radial-gradient(ellipse at 28% 68%, rgba(35,20, 80,0.48) 0%,transparent 55%),
    repeating-linear-gradient(122deg,transparent 0,transparent 5px,rgba(255,255,255,0.010) 5px,rgba(255,255,255,0.010) 6px),
    linear-gradient(150deg,#1e1638 0%,#100c22 100%);
}
.back-cv::before{content:"";position:absolute;inset:5%;border:1px solid rgba(180,160,230,0.20);pointer-events:none;}
.back-cv::after {content:"";position:absolute;inset:6.5%;border:1px solid rgba(180,160,230,0.07);pointer-events:none;}
.bc-body{position:relative;z-index:3;text-align:center;}
.bc-q{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(10px,1.28vw,15px);color:rgba(240,236,252,0.54);line-height:1.9;margin-bottom:15px;}
.bc-rule{width:26%;height:1px;margin:0 auto 12px;background:linear-gradient(to right,transparent,rgba(180,160,230,0.34),transparent);}
.bc-auth{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(8px,.86vw,11px);letter-spacing:.28em;color:#c4b4e8;opacity:.38;}

/* ═══════════════════════════════
   NAV
═══════════════════════════════ */
.nav{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  z-index:200;display:flex;align-items:center;
  background:rgba(8,6,18,0.86);
  border:1px solid rgba(180,160,230,0.15);
  border-radius:100px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 4px 20px rgba(0,0,0,0.55);
  overflow:hidden;user-select:none;
}
.nb{background:none;border:none;color:rgba(180,160,230,0.52);cursor:pointer;padding:11px 22px;font-size:15px;transition:color .15s,background .15s;line-height:1;display:flex;align-items:center;}
.nb:hover{color:#c4b4e8;background:rgba(180,160,230,0.07);}
.nb:active{transform:scale(0.84);}
.nb.off{opacity:0.12;pointer-events:none;}
.ndiv{width:1px;height:15px;background:rgba(180,160,230,0.10);}
.nlbl{font-family:'Cormorant Upright',serif;font-weight:300;font-size:10px;letter-spacing:.22em;color:rgba(180,160,230,0.26);padding:0 17px;min-width:66px;text-align:center;}
.khint{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);font-family:'Cormorant Upright',serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(180,160,230,0.12);white-space:nowrap;z-index:200;pointer-events:none;animation:kfa 7s ease 3s both;}
@keyframes kfa{0%{opacity:0}12%{opacity:1}78%{opacity:1}100%{opacity:0}}
@media(max-width:600px){.khint{display:none;}}
</style>
</head>
<body>

<div class="shell" id="shell">
  <div class="shadow"></div>
  <div id="book">
    <div class="pg" id="pgL"></div>
    <div class="spine" id="spine"></div>
    <div class="pg" id="pgR"></div>
  </div>
</div>

<div class="nav">
  <button class="nb off" id="btnPrev" onclick="go(-1)">&#8592;</button>
  <div class="ndiv"></div>
  <span class="nlbl" id="nlbl">&nbsp;</span>
  <div class="ndiv"></div>
  <button class="nb" id="btnNext" onclick="go(1)">&#8594;</button>
</div>
<p class="khint">← → arrow keys</p>

<script>
/* ══════════════════════════════════
   CONFIG  ✏️
══════════════════════════════════ */
var CFG = {
  title:     "Verses",
  subtitle:  "a poetry collection",
  author:    "Your Name",
  /* ✏️ Drop image file next to index.html, set filename. Leave "" for none. */
  cover:     "",
  dedication:"In her words, I found a country<br>I did not know I was homesick for.",
  dedAttr:   "— for you, always",
  backQuote: "She is a poem herself —<br>the kind that changes meaning<br>each time you read it."
};

/* ══════════════════════════════════
   POEMS  ✏️
   { title:"...", lines:["line","","blank = stanza break"] }
══════════════════════════════════ */
var POEMS = [
  /* paste your poems here, e.g.:
  {
    title: "Poem Title",
    lines: [
      "First line,",
      "second line.",
      "",
      "New stanza."
    ]
  },
  */
];

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
function roman(n){
  var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],
      s=["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"],r="";
  for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i];}return r;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ══════════════════════════════════
   PAGE HTML BUILDERS
══════════════════════════════════ */
function hFrontCover(){
  return '<div class="cover-face">'
    +'<div class="sp-l"></div>'
    +'<div class="cn tl"></div><div class="cn tr"></div>'
    +'<div class="cn bl"></div><div class="cn br"></div>'
    +'<div class="cov-img">'
    +(CFG.cover?'<img src="'+esc(CFG.cover)+'" alt=""/>':'<div class="noimg">'
      +'<svg width="78" height="102" viewBox="0 0 78 102" fill="none">'
      +'<rect x="4" y="4" width="70" height="94" rx="1" stroke="#c4b4e8" stroke-width="0.5"/>'
      +'<line x1="12" y1="22" x2="66" y2="22" stroke="#c4b4e8" stroke-width="0.4"/>'
      +'<line x1="12" y1="32" x2="66" y2="32" stroke="#c4b4e8" stroke-width="0.4"/>'
      +'<line x1="12" y1="42" x2="50" y2="42" stroke="#c4b4e8" stroke-width="0.4"/>'
      +'<line x1="12" y1="56" x2="66" y2="56" stroke="#c4b4e8" stroke-width="0.4"/>'
      +'<line x1="12" y1="66" x2="56" y2="66" stroke="#c4b4e8" stroke-width="0.4"/>'
      +'<line x1="12" y1="76" x2="48" y2="76" stroke="#c4b4e8" stroke-width="0.4"/>'
      +'</svg></div>')
    +'</div>'
    +'<p class="cov-eye">A Collection of Poems</p>'
    +'<h1 class="cov-ttl">'+esc(CFG.title)+'</h1>'
    +'<div class="cov-rule"></div>'
    +'<p class="cov-auth">'+esc(CFG.author)+'</p>'
    +'</div>';
}
function hInnerDark(flip){
  return '<div class="inner-dark"'+(flip?' style="align-items:flex-start;justify-content:flex-start;"':'')+'>'+
    '<span>'+esc(CFG.title)+' · A Poetry Collection</span></div>';
}
function hTitle(){
  return '<div class="paper"><div class="tp">'
    +'<div class="tp-vl" style="height:clamp(20px,3.5vh,36px)"></div>'
    +'<span class="tp-eye">A Collection of Poems</span>'
    +'<span class="tp-ttl">'+esc(CFG.title)+'</span>'
    +'<span class="tp-sub">'+esc(CFG.subtitle)+'</span>'
    +'<div class="tp-rule"></div>'
    +'<span class="tp-auth">'+esc(CFG.author)+'</span>'
    +'<div class="tp-vlb" style="height:clamp(20px,3.5vh,36px)"></div>'
    +'</div></div>';
}
function hDed(){
  return '<div class="paper"><div class="ded">'
    +'<p class="ded-q">'+CFG.dedication+'</p>'
    +'<p class="ded-at">'+esc(CFG.dedAttr)+'</p>'
    +'</div></div>';
}
function hBlank(){return '<div class="paper"></div>';}
function hPoem(p,i){
  var lines=p.lines.map(function(l){return '<p>'+(l.trim()===''?'':esc(l))+'</p>';}).join('');
  return '<div class="paper"><div class="poem-wrap">'
    +'<div class="poem-inner">'
    +'<p class="p-roman">'+roman(i)+'</p>'
    +'<h2 class="p-title">'+esc(p.title)+'</h2>'
    +'<p class="p-orn">&#10022; &#10022; &#10022;</p>'
    +'<div class="p-body">'+lines+'</div>'
    +'</div><p class="p-num">'+i+'</p>'
    +'</div></div>';
}
function hBackCover(){
  return '<div class="back-cv">'
    +'<div class="sp-r"></div>'
    +'<div class="cn tl"></div><div class="cn tr"></div>'
    +'<div class="cn bl"></div><div class="cn br"></div>'
    +'<div class="bc-body">'
    +'<p class="bc-q">'+CFG.backQuote+'</p>'
    +'<div class="bc-rule"></div>'
    +'<p class="bc-auth">'+esc(CFG.author)+'</p>'
    +'</div></div>';
}
function hNoPoems(){
  return '<div class="paper"><div class="poem-wrap"><div class="poem-inner">'
    +'<p class="p-roman" style="opacity:.16">&#x2661;</p>'
    +'<h2 class="p-title" style="opacity:.26">No poems yet</h2>'
    +'<p class="p-orn" style="opacity:.13">&#10022; &#10022; &#10022;</p>'
    +'<div class="p-body" style="opacity:.20"><p>Add poems to the POEMS array</p><p>in index.html.</p></div>'
    +'</div></div></div>';
}

/* ══════════════════════════════════
   BUILD SPREADS
   Each spread = { L: html, R: html }
══════════════════════════════════ */
var S = [];  // spreads array

function build(){
  S = [];
  S.push({ L: hFrontCover(),  R: hInnerDark(false) });
  S.push({ L: hTitle(),       R: hDed() });

  var pp = POEMS.length === 0
    ? [hNoPoems(), hBlank()]
    : POEMS.map(function(p,i){ return hPoem(p,i+1); });
  if(pp.length%2!==0) pp.push(hBlank());
  for(var i=0;i<pp.length;i+=2) S.push({ L:pp[i], R:pp[i+1] });

  S.push({ L: hInnerDark(true), R: hBackCover() });
}

/* ══════════════════════════════════
   SIZING
══════════════════════════════════ */
var PW=0, PH=0, MOB=false;

function size(){
  var W=window.innerWidth, H=window.innerHeight;
  MOB = W < 680;
  if(MOB){
    PH=Math.min(H*0.74,540); PW=PH/1.414;
    if(PW>W*0.88){PW=W*0.88; PH=PW*1.414;}
  } else {
    PH=Math.min(H*0.78,610); PW=PH/1.414;
    if(PW*2>W*0.84){PW=(W*0.84)/2; PH=PW*1.414;}
  }
  PW=Math.round(PW); PH=Math.round(PH);

  var bk=document.getElementById('book');
  bk.style.width  = (MOB?PW:PW*2)+'px';
  bk.style.height = PH+'px';

  document.getElementById('pgL').style.cssText =
    'width:'+PW+'px;height:'+PH+'px;display:'+(MOB?'none':'block')+';';
  document.getElementById('pgR').style.cssText =
    'width:'+PW+'px;height:'+PH+'px;';

  var sp=document.getElementById('spine');
  sp.style.left   = (PW-12)+'px';
  sp.style.height = PH+'px';
  sp.style.display= MOB?'none':'block';
}

/* ══════════════════════════════════
   RENDER  (instant, no animation)
══════════════════════════════════ */
var CUR = 0;

function render(idx){
  var sp = S[idx];
  if(MOB){
    // mobile: show one page — cover shows L, rest show R
    document.getElementById('pgR').innerHTML = (idx===0) ? sp.L : sp.R;
  } else {
    document.getElementById('pgL').innerHTML = sp.L;
    document.getElementById('pgR').innerHTML = sp.R;
  }
}

/* ══════════════════════════════════
   PAGE TURN
   The simplest reliable animation:
   slide the two pages horizontally.
   outgoing slides out, incoming slides in.
   Uses CSS transition on transform only —
   no 3D, no preserve-3d, no backface.
══════════════════════════════════ */
var BUSY = false;
var DUR  = 420;  /* ms */

function go(dir){
  if(BUSY) return;
  var next = CUR + dir;
  if(next < 0 || next >= S.length) return;
  BUSY = true;

  var pgL = document.getElementById('pgL');
  var pgR = document.getElementById('pgR');
  var bk  = document.getElementById('book');

  var curr = S[CUR];
  var dest = S[next];

  if(MOB){
    /* ── Mobile: fade swap ── */
    var el = pgR;
    el.style.transition = 'none';
    el.style.opacity    = '1';

    // show outgoing page already set, just fade it out
    el.style.transition = 'opacity '+DUR+'ms ease';
    el.style.opacity    = '0';

    setTimeout(function(){
      CUR = next;
      el.style.transition = 'none';
      el.innerHTML = (CUR===0) ? S[CUR].L : S[CUR].R;
      el.style.opacity = '0';
      // force reflow
      void el.offsetWidth;
      el.style.transition = 'opacity '+(DUR*0.6)+'ms ease';
      el.style.opacity    = '1';
      setTimeout(function(){
        el.style.transition=''; el.style.opacity='';
        updateNav(); BUSY=false;
      }, DUR*0.6+20);
    }, DUR+10);
    return;
  }

  /* ── Desktop: horizontal slide ──
     We place an overlay div on top of the book
     that slides out, revealing the new page underneath.
  */
  var W = PW * 2;
  var overlay = document.createElement('div');
  overlay.style.cssText =
    'position:absolute;top:0;left:0;width:'+W+'px;height:'+PH+'px;'
    +'display:flex;z-index:50;pointer-events:none;'
    +'transform:translateX(0);'
    +'will-change:transform;';

  // overlay shows CURRENT spread
  var oL = document.createElement('div');
  oL.style.cssText = 'width:'+PW+'px;height:'+PH+'px;flex-shrink:0;overflow:hidden;';
  oL.innerHTML = curr.L;

  var oR = document.createElement('div');
  oR.style.cssText = 'width:'+PW+'px;height:'+PH+'px;flex-shrink:0;overflow:hidden;';
  oR.innerHTML = curr.R;

  overlay.appendChild(oL);
  overlay.appendChild(oR);
  bk.appendChild(overlay);

  // immediately render destination behind the overlay
  pgL.innerHTML = dest.L;
  pgR.innerHTML = dest.R;

  // add a subtle shadow on the sliding edge
  var edgeShadow = document.createElement('div');
  edgeShadow.style.cssText =
    'position:absolute;top:0;height:'+PH+'px;width:32px;z-index:51;pointer-events:none;'
    +(dir>0
      ? 'right:0;background:linear-gradient(to left,rgba(0,0,0,0.18) 0%,transparent 100%);'
      : 'left:0;background:linear-gradient(to right,rgba(0,0,0,0.18) 0%,transparent 100%);');
  overlay.appendChild(edgeShadow);

  // force reflow so transition fires
  void overlay.offsetWidth;

  overlay.style.transition = 'transform '+DUR+'ms cubic-bezier(0.4, 0, 0.2, 1)';
  overlay.style.transform  = 'translateX('+(dir > 0 ? -W : W)+'px)';

  setTimeout(function(){
    bk.removeChild(overlay);
    CUR = next;
    render(CUR);
    updateNav();
    BUSY = false;
  }, DUR + 20);
}

/* ══════════════════════════════════
   NAV + INIT
══════════════════════════════════ */
function updateNav(){
  document.getElementById('nlbl').textContent = (CUR+1)+' / '+S.length;
  document.getElementById('btnPrev').classList.toggle('off', CUR===0);
  document.getElementById('btnNext').classList.toggle('off', CUR===S.length-1);
}

function init(){
  build();
  size();
  render(0);
  updateNav();

  document.addEventListener('keydown',function(e){
    if(e.keyCode===37) go(-1);
    if(e.keyCode===39) go(1);
  });

  var tx=0, ty=0;
  document.getElementById('book').addEventListener('touchstart',function(e){
    tx=e.touches[0].clientX; ty=e.touches[0].clientY;
  },{passive:true});
  document.getElementById('book').addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>36) go(dx<0?1:-1);
  },{passive:true});

  window.addEventListener('resize',function(){ size(); render(CUR); updateNav(); });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
