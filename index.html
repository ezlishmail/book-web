<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;1,400;1,500&family=Cormorant+Upright:wght@300;400&display=swap" rel="stylesheet">
<title>Verses — A Poetry Collection</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#100b06;
  display:flex;align-items:center;justify-content:center;
  font-family:'EB Garamond',Georgia,serif;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(180,120,50,0.07) 0%,transparent 100%),
    radial-gradient(ellipse 60% 80% at 20% 80%,rgba(80,40,10,0.4) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 20%,rgba(60,30,8,0.4) 0%,transparent 60%),
    repeating-linear-gradient(88deg,transparent 0px,transparent 6px,rgba(255,255,255,0.006) 6px,rgba(255,255,255,0.006) 7px),
    linear-gradient(170deg,#1e1208 0%,#0d0804 55%,#181005 100%);
}
body::after{
  content:"";position:fixed;top:-100px;left:50%;transform:translateX(-50%);
  width:900px;height:600px;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse,rgba(200,160,80,0.06) 0%,transparent 60%);
}

/* ── Loading screen ── */
#loading{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#100b06;gap:18px;
  transition:opacity 0.6s ease;
}
#loading.hide{opacity:0;pointer-events:none;}
.loading-title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(20px,3vw,32px);color:rgba(200,168,108,0.7);
}
.loading-dots{display:flex;gap:8px;}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(200,168,108,0.4);
  animation:dotPulse 1.2s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{
  0%,100%{transform:scale(1);opacity:0.3;}
  50%{transform:scale(1.4);opacity:1;}
}

/* ── Error screen ── */
#error-screen{
  position:fixed;inset:0;z-index:999;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:#100b06;padding:40px;text-align:center;gap:16px;
}
.err-title{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;color:rgba(200,168,108,0.8);}
.err-msg{font-family:'EB Garamond',serif;font-size:15px;color:rgba(200,168,108,0.4);line-height:1.7;max-width:420px;}
.err-code{font-family:monospace;font-size:12px;color:rgba(200,168,108,0.25);margin-top:8px;}

.scene{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;}
.book-wrap{
  position:relative;z-index:2;
  filter:drop-shadow(-10px 20px 60px rgba(0,0,0,0.9)) drop-shadow(-2px 4px 16px rgba(0,0,0,0.7)) drop-shadow(2px 2px 8px rgba(0,0,0,0.5));
}
#flipbook{background:#1c1008;}
#flipbook .page{background:#fdf8f0;overflow:hidden;}
#flipbook .hard{background:#1c1008 !important;overflow:hidden;}

/* ── FRONT COVER ── */
.front-cover{background:#1c1008 !important;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.fc-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(80,45,15,0.6) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(40,20,5,0.7) 0%,transparent 50%),
    repeating-linear-gradient(135deg,transparent 0px,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px),
    linear-gradient(160deg,#2a1608 0%,#1a0e06 50%,#221208 100%);
}
.fc-frame{position:absolute;inset:4.5%;border:1px solid rgba(195,160,100,0.35);pointer-events:none;z-index:2;}
.fc-frame2{position:absolute;inset:6%;border:1px solid rgba(195,160,100,0.13);pointer-events:none;z-index:2;}
.corner{position:absolute;width:22px;height:22px;border-style:solid;border-color:rgba(195,160,100,0.55);z-index:3;}
.c-tl{top:4%;left:4%;border-width:1.5px 0 0 1.5px;}
.c-tr{top:4%;right:4%;border-width:1.5px 1.5px 0 0;}
.c-bl{bottom:4%;left:4%;border-width:0 0 1.5px 1.5px;}
.c-br{bottom:4%;right:4%;border-width:0 1.5px 1.5px 0;}
.spine-l{position:absolute;top:0;left:0;width:12px;height:100%;background:linear-gradient(to right,rgba(0,0,0,0.8),rgba(0,0,0,0.1),transparent);z-index:4;pointer-events:none;}
.fc-content{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;padding:10%;text-align:center;}
.cover-img-box{width:58%;aspect-ratio:3/4;border:1px solid rgba(195,160,100,0.4);box-shadow:0 8px 40px rgba(0,0,0,0.7),inset 0 0 30px rgba(0,0,0,0.4);overflow:hidden;position:relative;margin-bottom:6%;flex-shrink:0;}
.cover-img-box img{width:100%;height:100%;object-fit:cover;display:block;opacity:0.6;mix-blend-mode:luminosity;}
.img-fallback{position:absolute;inset:0;background:linear-gradient(145deg,#2e1a0a 0%,#1a0e06 100%);display:flex;align-items:center;justify-content:center;}
.fallback-svg{opacity:0.22;}
.cv-eyebrow{font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,0.9vw,11px);letter-spacing:0.5em;text-transform:uppercase;color:#c8a86c;opacity:0.7;margin-bottom:8px;}
.cv-title{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:clamp(20px,3.2vw,40px);color:#f0e6d3;line-height:1.05;text-shadow:0 3px 24px rgba(0,0,0,0.7);}
.cv-rule{width:50%;height:1px;margin:10px auto;background:linear-gradient(to right,transparent,rgba(200,168,108,0.6),transparent);}
.cv-author{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(9px,1.15vw,14px);color:#c8a86c;opacity:0.75;letter-spacing:0.12em;}

/* ── INNER DARK PAGES ── */
.cvr-dark{background:linear-gradient(140deg,#231408 0%,#180e06 100%) !important;display:flex;align-items:flex-end;justify-content:flex-end;padding:9%;}
.cvr-dark span{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(7px,0.75vw,9px);letter-spacing:0.18em;color:rgba(195,160,100,0.2);writing-mode:vertical-rl;}

/* ── TITLE PAGE ── */
.title-page{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fdf8f0 !important;text-align:center;padding:11%;position:relative;overflow:hidden;}
.title-page::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(160,120,60,0.05) 0%,transparent 65%);}
.tp-vline-t{width:1px;background:linear-gradient(to bottom,transparent,#8b2020);margin-bottom:16px;position:relative;z-index:1;}
.tp-vline-b{width:1px;background:linear-gradient(to bottom,#8b2020,transparent);margin-top:16px;position:relative;z-index:1;}
.tp-eye{font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,0.8vw,9px);letter-spacing:0.5em;text-transform:uppercase;color:#9a8a78;margin-bottom:14px;position:relative;z-index:1;}
.tp-ttl{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:clamp(24px,4vw,48px);color:#1a1209;line-height:1.05;margin-bottom:8px;position:relative;z-index:1;}
.tp-sub{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(10px,1.15vw,13px);color:#6a5a48;margin-bottom:18px;position:relative;z-index:1;}
.tp-rule{width:32%;height:1px;margin:0 auto 16px;background:linear-gradient(to right,transparent,rgba(120,100,70,0.3),transparent);position:relative;z-index:1;}
.tp-auth{font-family:'EB Garamond',serif;font-size:clamp(10px,1.15vw,13px);color:#4a3f30;letter-spacing:0.1em;position:relative;z-index:1;}

/* ── DEDICATION ── */
.ded-page{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fdf8f0 !important;text-align:center;padding:14%;position:relative;overflow:hidden;}
.ded-page::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(140,100,50,0.04) 0%,transparent 60%);}
.ded-q{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(11px,1.5vw,18px);color:#4a3f30;line-height:2;margin-bottom:18px;position:relative;z-index:1;}
.ded-a{font-family:'EB Garamond',serif;font-size:clamp(9px,1vw,12px);letter-spacing:0.22em;color:#9a8a78;position:relative;z-index:1;}

/* ── POEM PAGES ── */
.poem-page{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fdf8f0 !important;position:relative;overflow:hidden;}
.poem-page::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(170,130,70,0.05) 0%,transparent 100%),radial-gradient(ellipse 60% 60% at 85% 85%,rgba(130,90,40,0.04) 0%,transparent 100%);pointer-events:none;}
.poem-inner{position:relative;z-index:1;width:78%;text-align:center;display:flex;flex-direction:column;align-items:center;}
.poem-numeral{font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,0.78vw,9px);letter-spacing:0.45em;text-transform:uppercase;color:#8b2020;opacity:0.55;margin-bottom:7px;}
.poem-title{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;font-size:clamp(14px,1.9vw,23px);color:#1a1209;line-height:1.2;margin-bottom:11px;}
.poem-ornament{color:#8b2020;font-size:clamp(9px,0.9vw,12px);opacity:0.3;letter-spacing:0.7em;margin-bottom:13px;}
.poem-body{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(11px,1.3vw,16px);color:#4a3f30;line-height:2.05;text-align:center;}
.poem-body p{min-height:1.1em;}
.page-num{position:absolute;bottom:5%;width:100%;text-align:center;font-family:'Cormorant Upright',serif;font-weight:300;font-size:clamp(7px,0.75vw,9px);letter-spacing:0.35em;color:#9a8a78;opacity:0.4;z-index:1;}

/* ── BACK COVER ── */
.back-cover{background:#1c1008 !important;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:13%;}
.back-cover::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 60% 30%,rgba(60,35,10,0.5) 0%,transparent 55%),radial-gradient(ellipse at 30% 70%,rgba(30,15,4,0.5) 0%,transparent 55%),repeating-linear-gradient(135deg,transparent 0px,transparent 3px,rgba(255,255,255,0.01) 3px,rgba(255,255,255,0.01) 4px),linear-gradient(160deg,#221408 0%,#180e06 100%);}
.back-cover::after{content:"";position:absolute;inset:4.5%;border:1px solid rgba(195,160,100,0.3);pointer-events:none;z-index:2;}
.bc-frame2{position:absolute;inset:6%;z-index:2;pointer-events:none;border:1px solid rgba(195,160,100,0.1);}
.spine-r{position:absolute;top:0;right:0;width:12px;height:100%;background:linear-gradient(to left,rgba(0,0,0,0.8),rgba(0,0,0,0.1),transparent);z-index:5;pointer-events:none;}
.bc-corner{position:absolute;width:22px;height:22px;border-style:solid;border-color:rgba(195,160,100,0.45);z-index:4;}
.bcc-tl{top:4%;left:4%;border-width:1.5px 0 0 1.5px;}
.bcc-tr{top:4%;right:4%;border-width:1.5px 1.5px 0 0;}
.bcc-bl{bottom:4%;left:4%;border-width:0 0 1.5px 1.5px;}
.bcc-br{bottom:4%;right:4%;border-width:0 1.5px 1.5px 0;}
.bc-content{position:relative;z-index:3;text-align:center;}
.bc-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(10px,1.35vw,16px);color:rgba(240,228,208,0.6);line-height:1.9;margin-bottom:16px;}
.bc-rule{width:30%;height:1px;margin:0 auto 14px;background:linear-gradient(to right,transparent,rgba(195,160,100,0.5),transparent);}
.bc-author{font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(8px,0.9vw,11px);letter-spacing:0.28em;color:#c8a86c;opacity:0.5;}

/* ── NAV BAR ── */
.nav-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;background:rgba(16,10,4,0.82);border:1px solid rgba(195,160,100,0.2);border-radius:100px;overflow:hidden;backdrop-filter:blur(20px);box-shadow:0 6px 28px rgba(0,0,0,0.6);}
.nav-btn{background:none;border:none;color:rgba(195,160,100,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:12px 22px;font-size:14px;transition:all .18s;line-height:1;}
.nav-btn:hover{color:#c8a86c;background:rgba(195,160,100,0.07);}
.nav-btn:active{transform:scale(0.85);}
.nav-btn.off{opacity:0.15;pointer-events:none;}
.nav-sep{width:1px;height:16px;background:rgba(195,160,100,0.12);}
.nav-label{font-family:'Cormorant Upright',serif;font-weight:300;font-size:10px;letter-spacing:0.22em;color:rgba(195,160,100,0.35);padding:0 18px;min-width:72px;text-align:center;user-select:none;}
.key-hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);font-family:'Cormorant Upright',serif;font-size:9px;letter-spacing:0.22em;color:rgba(195,160,100,0.18);text-transform:uppercase;white-space:nowrap;z-index:200;animation:kh 6s ease 3s both;pointer-events:none;}
@keyframes kh{0%{opacity:0;}15%{opacity:1;}75%{opacity:1;}100%{opacity:0;}}
@media(max-width:640px){.key-hint{display:none;}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <p class="loading-title">Opening the book…</p>
  <div class="loading-dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- Error screen -->
<div id="error-screen">
  <p class="err-title">Could not open the book</p>
  <p class="err-msg" id="err-msg">Make sure <code>poems-list.json</code> exists and the <code>poems/</code> folder is set up correctly.</p>
  <p class="err-code" id="err-code"></p>
</div>

<div class="scene">
<div class="book-wrap">
<div id="flipbook">
  <!-- Pages are injected here by JavaScript -->
</div>
</div>
</div>

<div class="nav-bar" id="navBar" style="display:none">
  <button class="nav-btn off" id="btnPrev" onclick="prevPage()">&#8592;</button>
  <div class="nav-sep"></div>
  <span class="nav-label" id="navLabel">&nbsp;</span>
  <div class="nav-sep"></div>
  <button class="nav-btn" id="btnNext" onclick="nextPage()">&#8594;</button>
</div>
<p class="key-hint" id="keyHint" style="display:none">Use ← → arrow keys to turn pages</p>

<script src="jquery.js"></script>
<script src="turn.js"></script>
<script>
/* ============================================================
   CONFIGURATION — edit these if needed
   ============================================================ */
var CONFIG = {
  bookTitle:  "Verses",             /* ✏️ Book title */
  bookSub:    "a poetry collection",/* ✏️ Subtitle on title page */
  authorName: "Your Name",          /* ✏️ Author name */
  coverImage: "images/cover.jpg",   /* ✏️ Cover image path */
  dedication: "In her words, I found a country<br>I did not know I was homesick for.", /* ✏️ Dedication quote */
  dedAttr:    "— for you, always",  /* ✏️ Dedication attribution */
  backQuote:  "She is a poem herself —<br>the kind that changes meaning<br>each time you read it.", /* ✏️ Back cover quote */
};

/* ============================================================
   ROMAN NUMERALS helper
   ============================================================ */
function toRoman(n){
  var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1];
  var s=["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"];
  var r="";
  for(var i=0;i<v.length;i++) while(n>=v[i]){r+=s[i];n-=v[i];}
  return r;
}

/* ============================================================
   PARSE .txt poem file
   Format:
     Line 1      = Title
     Blank line  = separator after title (skip)
     Remaining   = poem lines (blank line = stanza break)
   ============================================================ */
function parsePoemFile(text){
  var lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  var title = lines[0].trim();
  var bodyLines = lines.slice(1); // skip title
  // skip the first blank line after title
  while(bodyLines.length && bodyLines[0].trim()==="") bodyLines.shift();
  return { title: title, lines: bodyLines };
}

/* ============================================================
   BUILD A POEM PAGE
   ============================================================ */
function buildPoemPage(poem, index){
  var linesHtml = poem.lines.map(function(l){
    return '<p>' + (l.trim() === '' ? '' : escHtml(l)) + '</p>';
  }).join('');

  return '<div class="page poem-page">'
    + '<div class="poem-inner">'
    + '<p class="poem-numeral">' + toRoman(index) + '</p>'
    + '<h2 class="poem-title">' + escHtml(poem.title) + '</h2>'
    + '<p class="poem-ornament">&#10022; &#10022; &#10022;</p>'
    + '<div class="poem-body">' + linesHtml + '</div>'
    + '</div>'
    + '<p class="page-num">' + index + '</p>'
    + '</div>';
}

function escHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ============================================================
   BUILD STATIC PAGES (covers, title, dedication, back)
   ============================================================ */
function buildCover(){
  return '<div class="hard front-cover">'
    + '<div class="fc-bg"></div>'
    + '<div class="fc-frame"></div><div class="fc-frame2"></div>'
    + '<div class="corner c-tl"></div><div class="corner c-tr"></div>'
    + '<div class="corner c-bl"></div><div class="corner c-br"></div>'
    + '<div class="spine-l"></div>'
    + '<div class="fc-content">'
    +   '<div class="cover-img-box">'
    +     '<img src="' + CONFIG.coverImage + '" alt="" onerror="this.style.display=\'none\'"/>'
    +     '<div class="img-fallback">'
    +       '<svg class="fallback-svg" width="110" height="140" viewBox="0 0 110 140" fill="none">'
    +         '<rect x="8" y="8" width="94" height="124" rx="1" stroke="#c8a86c" stroke-width="0.5"/>'
    +         '<line x1="22" y1="35" x2="88" y2="35" stroke="#c8a86c" stroke-width="0.4"/>'
    +         '<line x1="22" y1="48" x2="88" y2="48" stroke="#c8a86c" stroke-width="0.4"/>'
    +         '<line x1="22" y1="61" x2="70" y2="61" stroke="#c8a86c" stroke-width="0.4"/>'
    +         '<line x1="22" y1="82" x2="88" y2="82" stroke="#c8a86c" stroke-width="0.4"/>'
    +         '<line x1="22" y1="95" x2="78" y2="95" stroke="#c8a86c" stroke-width="0.4"/>'
    +         '<line x1="22" y1="108" x2="65" y2="108" stroke="#c8a86c" stroke-width="0.4"/>'
    +         '<circle cx="55" cy="22" r="9" stroke="#c8a86c" stroke-width="0.4"/>'
    +       '</svg>'
    +     '</div>'
    +   '</div>'
    +   '<p class="cv-eyebrow">A Collection of Poems</p>'
    +   '<h1 class="cv-title">' + escHtml(CONFIG.bookTitle) + '</h1>'
    +   '<div class="cv-rule"></div>'
    +   '<p class="cv-author">' + escHtml(CONFIG.authorName) + '</p>'
    + '</div>'
    + '</div>';
}

function buildBackOfFront(){
  return '<div class="hard cvr-dark"><span>' + escHtml(CONFIG.bookTitle) + ' &nbsp;·&nbsp; A Poetry Collection</span></div>';
}

function buildTitlePage(){
  return '<div class="page title-page">'
    + '<div class="tp-vline-t" style="height:clamp(22px,4vh,42px)"></div>'
    + '<p class="tp-eye">A Collection of Poems</p>'
    + '<h1 class="tp-ttl">' + escHtml(CONFIG.bookTitle) + '</h1>'
    + '<p class="tp-sub">' + escHtml(CONFIG.bookSub) + '</p>'
    + '<div class="tp-rule"></div>'
    + '<p class="tp-auth">' + escHtml(CONFIG.authorName) + '</p>'
    + '<div class="tp-vline-b" style="height:clamp(22px,4vh,42px)"></div>'
    + '</div>';
}

function buildDedication(){
  return '<div class="page ded-page">'
    + '<p class="ded-q">' + CONFIG.dedication + '</p>'
    + '<p class="ded-a">' + escHtml(CONFIG.dedAttr) + '</p>'
    + '</div>';
}

function buildBackInner(){
  return '<div class="hard cvr-dark" style="align-items:flex-start;justify-content:flex-start;"><span>' + escHtml(CONFIG.bookTitle) + ' &nbsp;·&nbsp; A Poetry Collection</span></div>';
}

function buildBackCover(){
  return '<div class="hard back-cover">'
    + '<div class="bc-frame2"></div>'
    + '<div class="bc-corner bcc-tl"></div><div class="bc-corner bcc-tr"></div>'
    + '<div class="bc-corner bcc-bl"></div><div class="bc-corner bcc-br"></div>'
    + '<div class="spine-r"></div>'
    + '<div class="bc-content">'
    +   '<p class="bc-quote">' + CONFIG.backQuote + '</p>'
    +   '<div class="bc-rule"></div>'
    +   '<p class="bc-author">' + escHtml(CONFIG.authorName) + '</p>'
    + '</div>'
    + '</div>';
}

/* ============================================================
   INITIALISE TURN.JS
   ============================================================ */
function initBook(){
  var W = window.innerWidth, H = window.innerHeight;
  var mobile = W < 700;
  var pageH, pageW;
  if(mobile){
    pageH = Math.min(H * 0.76, 580);
    pageW = pageH / 1.414;
    if(pageW > W * 0.90){ pageW = W * 0.90; pageH = pageW * 1.414; }
  } else {
    pageH = Math.min(H * 0.80, 640);
    pageW = pageH / 1.414;
    if(pageW * 2 > W * 0.86){ pageW = (W * 0.86) / 2; pageH = pageW * 1.414; }
  }
  var bookW = mobile ? pageW : pageW * 2;

  $('#flipbook').turn({
    width: bookW, height: pageH,
    autoCenter: true,
    display: mobile ? 'single' : 'double',
    acceleration: true, gradients: true, elevation: 50, duration: 850,
    when:{
      turning: function(e,p){ updateNav(p); },
      turned:  function(e,p){ updateNav(p); }
    }
  });

  updateNav(1);
  $('#loading').addClass('hide');
  setTimeout(function(){ $('#loading').hide(); }, 700);
  $('#navBar').show();
  $('#keyHint').show();

  /* Keyboard */
  $(document).on('keydown', function(e){
    if(e.keyCode===37) prevPage();
    if(e.keyCode===39) nextPage();
  });

  /* Touch swipe */
  var tx=0, ty=0;
  var el = document.getElementById('flipbook');
  el.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){ dx<0?nextPage():prevPage(); }
  },{passive:true});
}

function prevPage(){ $('#flipbook').turn('previous'); }
function nextPage(){ $('#flipbook').turn('next'); }
function updateNav(page){
  var total=$('#flipbook').turn('pages');
  $('#navLabel').text(page+' / '+total);
  $('#btnPrev').toggleClass('off',page<=1);
  $('#btnNext').toggleClass('off',page>=total);
}

/* ============================================================
   MAIN LOADER
   Reads poems-list.json → fetches each .txt → builds the book
   ============================================================ */
function showError(msg, detail){
  $('#loading').hide();
  $('#error-screen').css('display','flex');
  $('#err-msg').html(msg);
  if(detail) $('#err-code').text(detail);
}

function loadBook(){

  /* Detect file:// protocol — won't work locally */
  if(window.location.protocol === 'file:'){
    showError(
      'You\'re opening this directly from your computer (file://).<br><br>'
      + 'This won\'t work because browsers block local file loading.<br><br>'
      + '<strong>Fix:</strong> Push all files to GitHub and open the GitHub Pages URL instead.<br>'
      + 'Or use a local server: <code>npx serve .</code> in the project folder.',
      'protocol: file:// — fetch() is blocked'
    );
    return;
  }

  fetch('poems/poems-list.json')
    .then(function(r){
      if(r.status === 404){
        throw new Error(
          'MISSING FILE: poems/poems-list.json\n\n'
          + 'Make sure you uploaded the entire "poems" folder to GitHub, not just index.html.'
        );
      }
      if(!r.ok) throw new Error('HTTP ' + r.status + ' loading poems-list.json');
      return r.json();
    })
    .then(function(fileList){
      if(!Array.isArray(fileList) || fileList.length === 0){
        throw new Error('poems-list.json is empty. Add your poem filenames to it.');
      }
      var fetches = fileList.map(function(fname){
        return fetch('poems/' + fname)
          .then(function(r){
            if(r.status === 404){
              throw new Error(
                'MISSING FILE: poems/' + fname + '\n\n'
                + 'This file is listed in poems-list.json but wasn\'t found.\n'
                + 'Make sure you uploaded it to the poems/ folder on GitHub.'
              );
            }
            if(!r.ok) throw new Error('HTTP ' + r.status + ' loading poems/' + fname);
            return r.text();
          })
          .then(function(txt){ return parsePoemFile(txt); });
      });
      return Promise.all(fetches);
    })
    .then(function(poems){
      var html = '';
      html += buildCover();
      html += buildBackOfFront();
      html += buildTitlePage();
      html += buildDedication();
      poems.forEach(function(poem, i){ html += buildPoemPage(poem, i+1); });
      html += buildBackInner();
      html += buildBackCover();
      document.getElementById('flipbook').innerHTML = html;
      initBook();
    })
    .catch(function(err){
      showError(
        'Could not open the book. See the error below.',
        err.message
      );
    });
}

/* Start */
document.addEventListener('DOMContentLoaded', loadBook);
</script>
</body>
</html>
